name: kernel-matrix

# Boots real kernels (5.10 / 5.15 / 6.1 / 6.6) via cilium little-vm-helper
# and load-tests every example .bpf.o against each kernel's verifier. Kernel
# images are the LVH "complexity-test" flavor (BTF + bpftool), pinned by
# dated tag in scripts/kernel-matrix/images.json.
#
# Invoked two ways: manual `workflow_dispatch`, and as a reusable workflow
# (`workflow_call`) that release.yml runs as a GATE before publishing a
# GitHub Release — a required-kernel mismatch (6.1 / 6.6) fails this workflow
# and therefore blocks the release. It deliberately does NOT trigger on tag
# push itself: release.yml owns the tag trigger and calls this, so it runs
# once per release, not twice. Gating every PR on a ~20-minute four-VM boot
# is intentionally avoided.
on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  build-objects:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      objects-cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'
      - name: Install clang/libbpf
        run: |
          sudo apt-get update -qq
          sudo env DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a \
            apt-get install -y -qq --no-install-recommends clang llvm libbpf-dev
      - name: Prepare vmlinux.h (shared build-only stub; runtime kernels carry their own BTF)
        run: sudo install -m 0644 scripts/ci/vmlinux-stub.h /usr/local/include/vmlinux.h
      - name: Build all examples (.bpf.o + reports co-located)
        run: make build-examples OUT=kmatrix-artifacts
      - id: cache-key
        run: echo "key=kmatrix-artifacts-${{ github.sha }}" >> $GITHUB_OUTPUT
      - uses: actions/cache/save@v4
        with:
          path: kmatrix-artifacts
          key: ${{ steps.cache-key.outputs.key }}

  matrix:
    needs: build-objects
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        kernel: ['5.10', '5.15', '6.1', '6.6']
    steps:
      - uses: actions/checkout@v6
      - name: Restore built objects + reports into the workspace
        uses: actions/cache/restore@v4
        with:
          # Restored under the checkout so it is visible at /host in the guest.
          path: kmatrix-artifacts
          key: ${{ needs.build-objects.outputs.objects-cache-key }}
          fail-on-cache-miss: true
      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends jq
      - name: Resolve LVH image version + gate for kernel ${{ matrix.kernel }}
        id: img
        run: |
          v=$(jq -er --arg k "${{ matrix.kernel }}" '.images[] | select(.kernel==$k) | .version' scripts/kernel-matrix/images.json)
          g=$(jq -er --arg k "${{ matrix.kernel }}" '.images[] | select(.kernel==$k) | .gate' scripts/kernel-matrix/images.json)
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "gate=$g"    >> "$GITHUB_OUTPUT"
          echo "kernel ${{ matrix.kernel }} -> image-version=$v gate=$g"
      - name: Boot kernel ${{ matrix.kernel }} and load objects
        uses: cilium/little-vm-helper@206cee185ac5920a462d3d2cb4f369d2d3a542a7 # v0.0.30
        with:
          test-name: kmatrix-${{ matrix.kernel }}
          image-repo: quay.io/lvh-images
          image: complexity-test
          image-version: ${{ steps.img.outputs.version }}
          host-mount: .
          install-dependencies: 'true'
          cmd: |
            set -e
            cd /host
            ./scripts/kernel-matrix/in-guest-load.sh /host/kmatrix-artifacts /host/kmatrix-artifacts/results.json
      - name: Compare loads against declared minimum kernels
        id: cmp
        continue-on-error: true
        run: bash scripts/kernel-matrix/check-results.sh ${{ matrix.kernel }} kmatrix-artifacts kmatrix-artifacts/results.json
      # Additive (A3): publish this cell's results.json + verifier logs so the
      # cross-kernel min_kernel floor check (floor-check job) can aggregate
      # them. Read-only w.r.t. the gate — it uploads what in-guest-load.sh
      # already wrote and runs even if Enforce gate fails, so the floor check
      # still sees every cell. Does NOT change the build/boot/compare steps.
      - name: Upload per-kernel load results (for floor check + log harvest)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kmatrix-results-${{ matrix.kernel }}
          path: |
            kmatrix-artifacts/results.json
            kmatrix-artifacts/logs/
          if-no-files-found: warn
          retention-days: 14
      - name: Enforce gate
        run: |
          if [ "${{ steps.cmp.outcome }}" = "success" ]; then
            echo "kernel ${{ matrix.kernel }} matched all declared expectations"
            exit 0
          fi
          if [ "${{ steps.img.outputs.gate }}" = "required" ]; then
            echo "::error::kernel ${{ matrix.kernel }} is required and had verifier-expectation mismatches"
            exit 1
          fi
          echo "::warning::kernel ${{ matrix.kernel }} (best-effort) had mismatches"

  # Additive (A3): cross-kernel min_kernel regression-guard. Runs AFTER every
  # boot cell so it can see the whole matrix. For each example it computes the
  # observed verifier floor (lowest kernel it loaded on) and compares it
  # against the declared summary.min_kernel; a mismatch on a REQUIRED kernel
  # fails (consistent with the per-cell gate above), a best-effort-only
  # mismatch warns. It NEVER rewrites min_kernel (spec O-4 — guard only). This
  # job does not touch the build/boot/compare steps; it only reads the
  # results.json each cell already uploaded plus the built reports.
  floor-check:
    needs: [build-objects, matrix]
    if: always() && needs.build-objects.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Restore built reports (carry summary.min_kernel)
        uses: actions/cache/restore@v4
        with:
          path: kmatrix-artifacts
          key: ${{ needs.build-objects.outputs.objects-cache-key }}
          fail-on-cache-miss: true
      - name: Download per-kernel load results
        uses: actions/download-artifact@v4
        with:
          pattern: kmatrix-results-*
          path: kmatrix-cells-raw
      - name: Lay out cells as <kernel>/results.json
        run: |
          set -euo pipefail
          mkdir -p kmatrix-cells
          for d in kmatrix-cells-raw/kmatrix-results-*; do
            [ -d "$d" ] || continue
            kernel="${d##*/kmatrix-results-}"
            mkdir -p "kmatrix-cells/$kernel"
            if [ -f "$d/results.json" ]; then
              cp "$d/results.json" "kmatrix-cells/$kernel/results.json"
            else
              echo "::warning::no results.json for kernel $kernel (cell may have failed to boot)"
            fi
          done
          echo "cells laid out:"
          find kmatrix-cells -name results.json
      - name: Cross-kernel min_kernel floor check
        run: bash scripts/kernel-matrix/check-min-kernel.sh kmatrix-cells kmatrix-artifacts scripts/kernel-matrix/images.json
