name: test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: "init.defaultBranch"
  GIT_CONFIG_VALUE_0: "main"
  GOTOOLCHAIN: local

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'
      - name: Run Go CI
        run: make ci-go
      - name: Parser fuzz (short)
        run: go test ./parser -run=^$ -fuzz=FuzzParse -fuzztime=60s
      - name: Install clang/libbpf dependencies
        run: |
          sudo apt-get update -qq
          sudo env DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a \
            apt-get install -y -qq --no-install-recommends clang llvm libbpf-dev
      - name: Prepare vmlinux.h
        run: |
          set -euo pipefail
          BPFTOOL="$(command -v bpftool || true)"
          if [ -r /sys/kernel/btf/vmlinux ] && [ -n "$BPFTOOL" ] && "$BPFTOOL" version >/dev/null 2>&1; then
            "$BPFTOOL" btf dump file /sys/kernel/btf/vmlinux format c | sudo tee /usr/local/include/vmlinux.h >/dev/null
            if ! grep -q '__VMLINUX_H__' /usr/local/include/vmlinux.h; then
              printf '%s\n' '#define __VMLINUX_H__' | sudo tee -a /usr/local/include/vmlinux.h >/dev/null
            fi
          else
            # Shared stub (scripts/ci/vmlinux-stub.h) — BPF context structs use
            # the real UAPI layout so direct context reads land at verifier-
            # valid offsets. Keep this fallback identical across workflows.
            sudo install -m 0644 scripts/ci/vmlinux-stub.h /usr/local/include/vmlinux.h
          fi
      - name: Run clang CI
        run: make ci-clang OUT=/tmp/horizon-ci
