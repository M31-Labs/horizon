name: release

on:
  push:
    tags:
      # Real semver release tags only (e.g. v0.3.0, v0.3.1, v1.0.0).
      # Intermediate phase / per-track tags such as v0.3.0-phase2 or
      # v0.3.0-phase1-cedar carry a suffix and are deliberately NOT matched —
      # they are not releases and have no CHANGELOG section.
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'
      - name: Run Go CI
        run: make ci-go
      - name: Install clang/libbpf dependencies
        run: |
          sudo apt-get update -qq
          sudo env DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a \
            apt-get install -y -qq --no-install-recommends clang llvm libbpf-dev
      - name: Prepare vmlinux.h
        run: |
          set -euo pipefail
          BPFTOOL="$(command -v bpftool || true)"
          if [ -r /sys/kernel/btf/vmlinux ] && [ -n "$BPFTOOL" ] && "$BPFTOOL" version >/dev/null 2>&1; then
            "$BPFTOOL" btf dump file /sys/kernel/btf/vmlinux format c | sudo tee /usr/local/include/vmlinux.h >/dev/null
            if ! grep -q '__VMLINUX_H__' /usr/local/include/vmlinux.h; then
              printf '%s\n' '#define __VMLINUX_H__' | sudo tee -a /usr/local/include/vmlinux.h >/dev/null
            fi
          else
            printf '%s\n' \
              '#define __VMLINUX_H__' \
              'typedef unsigned char __u8;' \
              'typedef unsigned short __u16;' \
              'typedef unsigned int __u32;' \
              'typedef unsigned long long __u64;' \
              'typedef signed char __s8;' \
              'typedef signed short __s16;' \
              'typedef signed int __s32;' \
              'typedef signed long long __s64;' \
              'typedef __u16 __be16;' \
              'typedef __u32 __be32;' \
              'typedef __u32 __wsum;' \
              'enum bpf_map_type { BPF_MAP_TYPE_HASH = 1, BPF_MAP_TYPE_ARRAY = 2, BPF_MAP_TYPE_PERCPU_HASH = 5, BPF_MAP_TYPE_PERCPU_ARRAY = 6, BPF_MAP_TYPE_LRU_HASH = 9, BPF_MAP_TYPE_LRU_PERCPU_HASH = 10, BPF_MAP_TYPE_RINGBUF = 27 };' \
              'enum { BPF_ANY = 0 };' \
              'struct __sk_buff;' \
              'struct pt_regs { __u64 di; __u64 si; __u64 dx; __u64 cx; __u64 r8; __u64 r9; __u64 sp; __u64 bp; __u64 ax; __u64 ip; };' \
              'struct task_struct { struct task_struct *real_parent; __u32 tgid; } __attribute__((preserve_access_index));' \
              'struct bpf_sock_addr { __u32 family; __u32 type; __u32 protocol; __u32 msg_src_ip4; __u32 user_ip4; __u32 user_port; };' \
              'struct xdp_md { __u32 data; __u32 data_end; };' \
              'struct trace_event_raw_sched_process_exec {};' |
              sudo tee /usr/local/include/vmlinux.h >/dev/null
          fi
      - name: Build examples
        run: make build-examples
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          if [ ! -f CHANGELOG.md ]; then
            echo "::error::CHANGELOG.md missing — cannot extract release notes"
            exit 1
          fi
          # Extract the body of a "## [<section>]" block, stopping at the next
          # "## [" heading. The heading line itself is omitted (the release
          # title already carries the tag).
          extract() {
            awk -v sec="$1" '
              $0 ~ "^## \\["sec"\\]" { inrange=1; next }
              inrange && /^## \[/    { exit }
              inrange                { print }
            ' CHANGELOG.md
          }
          # Prefer a section matching the tag, then the tag without a leading
          # "v", then fall back to the "Unreleased" section (the working
          # changelog keeps the pending release notes there until cut).
          NOTES="$(extract "$TAG")"
          [ -z "$(printf '%s' "$NOTES" | tr -d '[:space:]')" ] && NOTES="$(extract "${TAG#v}")"
          [ -z "$(printf '%s' "$NOTES" | tr -d '[:space:]')" ] && NOTES="$(extract "Unreleased")"
          if [ -z "$(printf '%s' "$NOTES" | tr -d '[:space:]')" ]; then
            echo "::error::No release notes found for $TAG (tried [$TAG], [${TAG#v}], [Unreleased]) in CHANGELOG.md"
            exit 1
          fi
          printf '%s\n' "$NOTES" > /tmp/release-notes.md
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/release-notes.md \
            --verify-tag
